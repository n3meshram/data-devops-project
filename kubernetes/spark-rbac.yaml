apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark-jobs

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: spark-jobs

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - persistentvolumeclaims
  verbs:
    - get
    - list
    - watch
    - create
    - delete
    - patch
    - update
    - deletecollection

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-rolebinding
  namespace: spark-jobs

subjects:
- kind: ServiceAccount
  name: spark
  namespace: spark-jobs

roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io