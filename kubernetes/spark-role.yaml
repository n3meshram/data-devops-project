apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: spark-role
  namespace: spark-jobs

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - persistentvolumeclaims
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
    - deletecollection